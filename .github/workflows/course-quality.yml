name: Course Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  course-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python onemillion-builder/scripts/course_quality_check.py

