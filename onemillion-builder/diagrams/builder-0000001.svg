<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c16"/>
      <stop offset="50%" stop-color="#0e1322"/>
      <stop offset="100%" stop-color="#11182c"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4B842"/>
      <stop offset="35%" stop-color="#FFE9A8"/>
      <stop offset="65%" stop-color="#FFD25A"/>
      <stop offset="100%" stop-color="#E08A1E"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orangeText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B2B"/>
      <stop offset="100%" stop-color="#FFA251"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sealGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="55%" stop-color="#F4B842"/>
      <stop offset="100%" stop-color="#B8780F"/>
    </radialGradient>
    <filter id="cGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cGlowS" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="guilloche" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 17 Q8.5 0 17 17 T34 17" fill="none" stroke="#FFD700" stroke-width="0.4" opacity="0.05"/>
      <path d="M0 17 Q8.5 34 17 17 T34 17" fill="none" stroke="#FFD700" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Paper -->
  <rect width="880" height="620" rx="18" fill="url(#paper)"/>
  <rect width="880" height="620" rx="18" fill="url(#guilloche)"/>
  <rect width="880" height="620" rx="18" fill="url(#centerGlow)"/>

  <!-- Ornamental borders -->
  <rect x="22" y="22" width="836" height="576" rx="12" fill="none" stroke="url(#goldText)" stroke-width="2" opacity="0.55"/>
  <rect x="32" y="32" width="816" height="556" rx="8"  fill="none" stroke="#FFD700" stroke-width="0.6" opacity="0.22"/>
  <rect x="38" y="38" width="804" height="544" rx="6"  fill="none" stroke="#FFD700" stroke-width="0.4" opacity="0.12"/>

  <!-- Corner flourishes -->
  <g stroke="url(#goldText)" stroke-width="1.4" fill="none" opacity="0.7" stroke-linecap="round">
    <!-- TL -->
    <path d="M48 86 L48 56 Q48 48 56 48 L86 48"/>
    <path d="M58 96 Q70 70 96 58" opacity="0.5"/>
    <circle cx="48" cy="48" r="3" fill="#FFD700" stroke="none"/>
    <!-- TR -->
    <path d="M832 86 L832 56 Q832 48 824 48 L794 48"/>
    <path d="M822 96 Q810 70 784 58" opacity="0.5"/>
    <circle cx="832" cy="48" r="3" fill="#FFD700" stroke="none"/>
    <!-- BL -->
    <path d="M48 534 L48 564 Q48 572 56 572 L86 572"/>
    <path d="M58 524 Q70 550 96 562" opacity="0.5"/>
    <circle cx="48" cy="572" r="3" fill="#FFD700" stroke="none"/>
    <!-- BR -->
    <path d="M832 534 L832 564 Q832 572 824 572 L794 572"/>
    <path d="M822 524 Q810 550 784 562" opacity="0.5"/>
    <circle cx="832" cy="572" r="3" fill="#FFD700" stroke="none"/>
  </g>

  <!-- Monogram medallion -->
  <g transform="translate(440,96)">
    <circle r="34" fill="#FFD700" opacity="0.06"/>
    <circle r="34" fill="none" stroke="url(#goldText)" stroke-width="1.4" opacity="0.55"/>
    <circle r="27" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
    <text y="9" font-size="26" font-weight="900" fill="url(#goldText)" text-anchor="middle">1M</text>
  </g>

  <!-- Course wordmark -->
  <text x="440" y="156" font-size="11.5" font-weight="600" fill="#9AA9C9" text-anchor="middle" letter-spacing="5">ONEMILLION · AGENTIC ENGINEERING</text>

  <!-- divider with center diamond -->
  <line x1="170" y1="176" x2="710" y2="176" stroke="url(#goldLine)" stroke-width="1"/>
  <rect x="434" y="170" width="12" height="12" fill="#FFD700" opacity="0.7" transform="rotate(45 440 176)"/>

  <!-- Title -->
  <text x="440" y="214" font-size="15" font-weight="500" fill="#7C8AAA" text-anchor="middle" letter-spacing="7">CERTIFICATE OF COMPLETION</text>

  <!-- awarded to -->
  <text x="440" y="252" font-size="16" fill="#8B9CC4" text-anchor="middle" font-style="italic" font-family="Georgia, 'Times New Roman', serif">This is awarded to</text>

  <!-- Recipient name -->
  <text x="440" y="322" font-size="60" font-weight="700" fill="url(#goldText)" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" filter="url(#cGlow)">Sid Dixit</text>

  <!-- name underline flourish -->
  <line x1="250" y1="342" x2="630" y2="342" stroke="url(#goldLine)" stroke-width="1" opacity="0.6"/>
  <circle cx="440" cy="342" r="2.5" fill="#FFD700" opacity="0.7"/>

  <!-- Description -->
  <text x="440" y="376" font-size="15" fill="#8B9CC4" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic">for building a real AI-native SaaS product and completing</text>
  <text x="440" y="404" font-size="19" font-weight="800" fill="url(#orangeText)" text-anchor="middle">all 18 days of OneMillion: Build in 18 Days</text>

  <!-- Builder number badge -->
  <g transform="translate(440,468)">
    <rect x="-150" y="-32" width="300" height="60" rx="30" fill="#FFD700" opacity="0.07"/>
    <rect x="-150" y="-32" width="300" height="60" rx="30" fill="none" stroke="url(#goldText)" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="-8" font-size="10" font-weight="600" fill="#8B9CC4" text-anchor="middle" letter-spacing="3.5">FOUNDING BUILDER</text>
    <text x="0" y="18" font-size="26" font-weight="900" fill="url(#goldText)" text-anchor="middle" letter-spacing="3" filter="url(#cGlowS)">#0000001</text>
  </g>

  <!-- Bottom row -->
  <g transform="translate(0,536)">
    <!-- date -->
    <text x="170" y="6" font-size="9" fill="#5A6886" text-anchor="middle" letter-spacing="2">DATE ISSUED</text>
    <line x1="110" y1="18" x2="230" y2="18" stroke="#FFD700" stroke-width="0.5" opacity="0.35"/>
    <text x="170" y="36" font-size="13" fill="#9AA9C9" text-anchor="middle" font-family="Georgia, serif">2026</text>

    <!-- seal -->
    <g transform="translate(440,12)">
      <!-- starburst -->
      <g fill="#F4B842" opacity="0.9">
        <path d="M0 -30 L4 -8 L-4 -8 Z"/><path d="M0 30 L4 8 L-4 8 Z"/>
        <path d="M-30 0 L-8 4 L-8 -4 Z"/><path d="M30 0 L8 4 L8 -4 Z"/>
        <path d="M-21 -21 L-4 -10 L-10 -4 Z"/><path d="M21 21 L4 10 L10 4 Z"/>
        <path d="M21 -21 L10 -4 L4 -10 Z"/><path d="M-21 21 L-10 4 L-4 10 Z"/>
      </g>
      <circle r="22" fill="url(#sealGrad)"/>
      <circle r="22" fill="none" stroke="#8A5A0A" stroke-width="0.8"/>
      <circle r="16" fill="none" stroke="#8A5A0A" stroke-width="0.6" opacity="0.5"/>
      <text y="5" font-size="15" fill="#5A3A06" text-anchor="middle" font-weight="900">★</text>
    </g>

    <!-- verify -->
    <text x="710" y="6" font-size="9" fill="#5A6886" text-anchor="middle" letter-spacing="2">VERIFY AT</text>
    <line x1="650" y1="18" x2="770" y2="18" stroke="#FFD700" stroke-width="0.5" opacity="0.35"/>
    <text x="710" y="36" font-size="13" fill="#9AA9C9" text-anchor="middle" font-family="Georgia, serif">onemillion.build</text>
  </g>
</svg>
