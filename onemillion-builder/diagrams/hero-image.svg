<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04060d"/>
      <stop offset="55%" stop-color="#070b16"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF5E1A"/>
      <stop offset="100%" stop-color="#FFA251"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE072"/>
      <stop offset="50%" stop-color="#FFC83D"/>
      <stop offset="100%" stop-color="#FF9416"/>
    </linearGradient>
    <linearGradient id="chipW1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A35"/>
      <stop offset="100%" stop-color="#E5440E"/>
    </linearGradient>
    <linearGradient id="chipW2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5FE0D6"/>
      <stop offset="100%" stop-color="#2BA89E"/>
    </linearGradient>
    <linearGradient id="chipW3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE072"/>
      <stop offset="100%" stop-color="#F2A91C"/>
    </linearGradient>
    <radialGradient id="orbOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B2B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B2B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowO" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="chipShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="560" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="240" cy="300" rx="520" ry="360" fill="url(#orbOrange)"/>
  <ellipse cx="980" cy="180" rx="420" ry="300" fill="url(#orbTeal)"/>

  <!-- Fine grid -->
  <g stroke="#FF6B2B" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="93" x2="1200" y2="93"/><line x1="0" y1="186" x2="1200" y2="186"/>
    <line x1="0" y1="279" x2="1200" y2="279"/><line x1="0" y1="372" x2="1200" y2="372"/>
    <line x1="0" y1="465" x2="1200" y2="465"/>
    <line x1="200" y1="0" x2="200" y2="560"/><line x1="400" y1="0" x2="400" y2="560"/>
    <line x1="600" y1="0" x2="600" y2="560"/><line x1="800" y1="0" x2="800" y2="560"/>
    <line x1="1000" y1="0" x2="1000" y2="560"/>
  </g>

  <!-- ════════ LEFT COLUMN ════════ -->
  <!-- Eyebrow pill -->
  <g>
    <rect x="80" y="66" width="196" height="30" rx="15" fill="#FF6B2B" opacity="0.12"/>
    <rect x="80" y="66" width="196" height="30" rx="15" fill="none" stroke="#FF6B2B" stroke-width="1" opacity="0.45"/>
    <circle cx="100" cy="81" r="3.5" fill="#FF6B2B"/>
    <text x="116" y="85" font-size="11.5" font-weight="700" fill="#FF8A4D" letter-spacing="2.5">FREE · OPEN SOURCE</text>
  </g>

  <!-- Headline -->
  <text x="77" y="186" font-size="66" font-weight="900" fill="#FFFFFF" letter-spacing="-2.5">Build ONE</text>
  <text x="77" y="254" font-size="66" font-weight="900" fill="#FFFFFF" letter-spacing="-2.5">real AI product</text>
  <text x="77" y="322" font-size="66" font-weight="900" fill="url(#orange)" letter-spacing="-2.5" filter="url(#glowO)">in 18 days.</text>

  <!-- Subline -->
  <text x="80" y="372" font-size="19" fill="#9AA9C9" font-weight="400">Deployed. Real users. On your résumé.</text>

  <!-- Stat divider -->
  <line x1="80" y1="408" x2="560" y2="408" stroke="#FFFFFF" stroke-width="1" opacity="0.07"/>

  <!-- Stats -->
  <g>
    <text x="80"  y="452" font-size="34" font-weight="900" fill="url(#gold)">18</text>
    <text x="80"  y="474" font-size="12" fill="#6B7A99" font-weight="600" letter-spacing="1.5">DAYS</text>

    <text x="200" y="452" font-size="34" font-weight="900" fill="url(#gold)">1–2h</text>
    <text x="200" y="474" font-size="12" fill="#6B7A99" font-weight="600" letter-spacing="1.5">PER DAY</text>

    <text x="345" y="452" font-size="34" font-weight="900" fill="url(#gold)">~$10</text>
    <text x="345" y="474" font-size="12" fill="#6B7A99" font-weight="600" letter-spacing="1.5">TOTAL COST</text>

    <text x="490" y="452" font-size="34" font-weight="900" fill="url(#gold)">∞</text>
    <text x="490" y="474" font-size="12" fill="#6B7A99" font-weight="600" letter-spacing="1.5">FREE FOREVER</text>
  </g>

  <!-- ════════ RIGHT COLUMN — the 18-day path ════════ -->
  <!-- Panel backdrop -->
  <rect x="648" y="56" width="472" height="448" rx="20" fill="#0B1120" opacity="0.55"/>
  <rect x="648" y="56" width="472" height="448" rx="20" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.06"/>

  <!-- WEEK 1 -->
  <g transform="translate(684,86)">
    <circle cx="4" cy="-4" r="4" fill="#FF6B2B"/>
    <text x="16" y="0" font-size="11" font-weight="700" fill="#FF8A4D" letter-spacing="2.5">WEEK 1 · FOUNDATION</text>
    <g filter="url(#chipShadow)">
      <rect x="0"   y="14" width="44" height="44" rx="11" fill="url(#chipW1)"/>
      <rect x="56"  y="14" width="44" height="44" rx="11" fill="url(#chipW1)"/>
      <rect x="112" y="14" width="44" height="44" rx="11" fill="url(#chipW1)"/>
      <rect x="168" y="14" width="44" height="44" rx="11" fill="url(#chipW1)"/>
      <rect x="224" y="14" width="44" height="44" rx="11" fill="url(#chipW1)"/>
      <rect x="280" y="14" width="44" height="44" rx="11" fill="url(#chipW1)"/>
    </g>
    <g font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">
      <text x="22"  y="42">1</text><text x="78"  y="42">2</text><text x="134" y="42">3</text>
      <text x="190" y="42">4</text><text x="246" y="42">5</text><text x="302" y="42">6</text>
    </g>
  </g>

  <!-- connector -->
  <line x1="836" y1="158" x2="836" y2="172" stroke="#4ECDC4" stroke-width="2" opacity="0.3"/>

  <!-- WEEK 2 -->
  <g transform="translate(684,200)">
    <circle cx="4" cy="-4" r="4" fill="#4ECDC4"/>
    <text x="16" y="0" font-size="11" font-weight="700" fill="#5FE0D6" letter-spacing="2.5">WEEK 2 · MAKE IT AI</text>
    <g filter="url(#chipShadow)">
      <rect x="0"   y="14" width="44" height="44" rx="11" fill="url(#chipW2)"/>
      <rect x="56"  y="14" width="44" height="44" rx="11" fill="url(#chipW2)"/>
      <rect x="112" y="14" width="44" height="44" rx="11" fill="url(#chipW2)"/>
      <rect x="168" y="14" width="44" height="44" rx="11" fill="url(#chipW2)"/>
      <rect x="224" y="14" width="44" height="44" rx="11" fill="url(#chipW2)"/>
      <rect x="280" y="14" width="44" height="44" rx="11" fill="url(#chipW2)"/>
    </g>
    <g font-size="16" font-weight="800" fill="#06231F" text-anchor="middle">
      <text x="22"  y="42">7</text><text x="78"  y="42">8</text><text x="134" y="42">9</text>
      <text x="190" y="42">10</text><text x="246" y="42">11</text><text x="302" y="42">12</text>
    </g>
  </g>

  <!-- connector -->
  <line x1="836" y1="272" x2="836" y2="286" stroke="#FFD700" stroke-width="2" opacity="0.3"/>

  <!-- WEEK 3 -->
  <g transform="translate(684,314)">
    <circle cx="4" cy="-4" r="4" fill="#FFD700"/>
    <text x="16" y="0" font-size="11" font-weight="700" fill="#FFD23D" letter-spacing="2.5">WEEK 3 · SHIP &amp; SELL</text>
    <g filter="url(#chipShadow)">
      <rect x="0"   y="14" width="44" height="44" rx="11" fill="url(#chipW3)"/>
      <rect x="56"  y="14" width="44" height="44" rx="11" fill="url(#chipW3)"/>
      <rect x="112" y="14" width="44" height="44" rx="11" fill="url(#chipW3)"/>
      <rect x="168" y="14" width="44" height="44" rx="11" fill="url(#chipW3)"/>
      <rect x="224" y="14" width="44" height="44" rx="11" fill="url(#chipW3)"/>
      <rect x="280" y="14" width="44" height="44" rx="13" fill="url(#chipW3)" filter="url(#glowO)"/>
    </g>
    <g font-size="16" font-weight="800" fill="#2B1C00" text-anchor="middle">
      <text x="22"  y="42">13</text><text x="78"  y="42">14</text><text x="134" y="42">15</text>
      <text x="190" y="42">16</text><text x="246" y="42">17</text><text x="302" y="42">18</text>
    </g>
    <!-- finish star on day 18 -->
    <text x="302" y="6" font-size="13" fill="#FFD700" text-anchor="middle" filter="url(#glowS)">★</text>
  </g>

  <!-- BUILDER BADGE -->
  <g transform="translate(684,404)">
    <rect x="0" y="0" width="404" height="76" rx="14" fill="#0E1426"/>
    <rect x="0" y="0" width="404" height="76" rx="14" fill="url(#gold)" opacity="0.05"/>
    <rect x="0" y="0" width="404" height="76" rx="14" fill="none" stroke="#FFD700" stroke-width="1.3" opacity="0.55"/>
    <!-- medallion -->
    <circle cx="40" cy="38" r="24" fill="#FFD700" opacity="0.09"/>
    <circle cx="40" cy="38" r="24" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <text x="40" y="46" font-size="22" text-anchor="middle">🏆</text>
    <!-- text -->
    <text x="78" y="30" font-size="11" font-weight="700" fill="#FFD23D" letter-spacing="1.5">FOUNDING BUILDER · #0000001</text>
    <text x="78" y="52" font-size="19" font-weight="900" fill="#FFFFFF">Sid Dixit</text>
    <text x="78" y="68" font-size="10.5" fill="#6B7A99">onemillion.build</text>
    <!-- verified -->
    <circle cx="372" cy="38" r="15" fill="#FFD700" opacity="0.12"/>
    <circle cx="372" cy="38" r="15" fill="none" stroke="#FFD700" stroke-width="1.3"/>
    <path d="M365 38 l5 5 l9 -10" fill="none" stroke="#FFD700" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ════════ FOOTER ════════ -->
  <line x1="80" y1="518" x2="1120" y2="518" stroke="#FF6B2B" stroke-width="1" opacity="0.12"/>
  <text x="80"   y="540" font-size="11.5" fill="#46577A">onemillion.build</text>
  <text x="600"  y="540" font-size="11.5" fill="#46577A" text-anchor="middle">By Sid Dixit · MIT License · Free forever</text>
  <text x="1120" y="540" font-size="11.5" fill="#46577A" text-anchor="end">#BuildingWith1M</text>
</svg>
